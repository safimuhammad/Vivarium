# Pre-commit hooks for Vivarium.
# Install once:  pre-commit install
# Run on demand: pre-commit run --all-files
#
# Config for all tools lives in pyproject.toml (single source of truth).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      # Lint (with autofix), then format.
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        # Type-check the production-bar code only for now. Phase 2/3 add their
        # packages here as they are brought up to strict typing.
        files: ^(core|tests)/
        args: ["--config-file=pyproject.toml"]
        additional_dependencies:
          - pydantic>=2
          - pytest
          - types-PyYAML
