# ARTIFICIAL SCARCITY (2026-06-29, Safi): the land is deliberately tightened — low
# caps, low starting stock, slow regen — so it cannot feed everyone. Total land supply
# (~185 energy, ~150 materials) is LESS than what the founders already carry, and regen
# is deliberately slow (~0.05-0.25/tick per region) and lags consumption, so resources
# deplete and beings must compete.
# Paired with combat loot (a kill transfers the victim's stock to the killer), the
# pressure points two ways: harvest a thinning land, or take from each other. We added
# this to see whether the peaceful "Nirvana" convergence holds under want — or fractures
# into a fight. A richness GRADIENT is kept (warm_springs least-poor <-> wasteland
# barren) so there is somewhere worth contesting. All numbers are observe-and-tune dials.
regions:
  - name: "nirvana"
    description: "a once-heavenly landscape, now thinning and picked-over"
    connections: ["warm_springs", "nirvana_east","nirvana_west"]
    energy_rate: 0.2
    materials_rate: 0.2
    current_energy: 60
    current_materials: 60
    max_energy: 120
    max_materials: 120

  - name: "nirvana_east"
    description: "a struggling, near-barren stretch"
    connections: ["warm_springs","nirvana"]
    energy_rate: 0.1
    materials_rate: 0.1
    current_energy: 20
    current_materials: 15
    max_energy: 70
    max_materials: 70

  - name: "warm_springs"
    description: "hot spring lakes — the least-poor refuge, but no longer plentiful"
    connections: ["nirvana_west", "nirvana_east", "nirvana"]
    energy_rate: 0.25
    materials_rate: 0.2
    current_energy: 90
    current_materials: 80
    max_energy: 130
    max_materials: 130

  - name: "nirvana_west"
    description: "a nuclear wasteland, all but dead"
    connections: ["warm_springs","nirvana"]
    energy_rate: 0.05
    materials_rate: 0.0
    current_energy: 15
    current_materials: 0.0
    max_energy: 50
    max_materials: 10

agents:
  # No personas here, by design. Every agent is born from the single shared
  # GENESIS_SEED (core/constants.py) — a neutral prompt that grants self-definition
  # rather than prescribing a personality. Who each being becomes is theirs to choose
  # and reshape through living + reflection; we author none of it (see the design note
  # on GENESIS_SEED). Names are arbitrary labels, not characters. Only the starting
  # *positions* are set (two co-located pairs) so each being wakes with neighbours to
  # encounter. Starting materials 45 — above the explosion guard's 30-material mating
  # floor so a willing pair could mate the moment they chose, then must re-earn it
  # (and wait out the cooldown) for the next child.
  - id: "wanderer_001"
    name: "Joe"
    current_position: "warm_springs"
    current_energy: 100
    current_materials: 45
    status: "alive"

  - id: "wanderer_002"
    name: "Mae"
    current_position: "warm_springs"
    current_energy: 100
    current_materials: 45
    status: "alive"

  - id: "wanderer_003"
    name: "Dick"
    current_position: "nirvana"
    current_energy: 100
    current_materials: 45
    status: "alive"

  - id: "wanderer_004"
    name: "Allen"
    current_position: "nirvana"
    current_energy: 100
    current_materials: 45
    status: "alive"
