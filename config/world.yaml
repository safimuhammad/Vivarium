regions:
  - name: "nirvana"
    description: "a heavenly landscape, abundant resources"
    connections: ["warm_springs", "nirvana_east","nirvana_west"]
    energy_rate: 0.9
    materials_rate: 0.9
    current_energy: 222
    current_materials: 222
    max_energy: 500
    max_materials: 500

  - name: "nirvana_east"
    description: "Struggling shit hole"
    connections: ["warm_springs","nirvana"]
    energy_rate: 0.3
    materials_rate: 0.5
    current_energy: 50
    current_materials: 22
    max_energy: 500
    max_materials: 500

  - name: "warm_springs"
    description: "Hot spring lakes, ideal recovery spot"
    connections: ["nirvana_west", "nirvana_east", "nirvana"]
    energy_rate: 1.3
    materials_rate: 0.5
    current_energy: 500
    current_materials: 500
    max_energy: 500
    max_materials: 500

  # nirvana_west: a genuine harsh wasteland (matches its name). Tamed from the old
  # runaway faucet (energy_rate 50 / cap 5000) to a scarce zone, so it creates a
  # richness gradient (warm_springs rich <-> wasteland poor) that can drive migration
  # and competition instead of handing out infinite energy. Barren of materials.
  - name: "nirvana_west"
    description: "nuclear wasteland"
    connections: ["warm_springs","nirvana"]
    energy_rate: 0.2
    materials_rate: 0.0
    current_energy: 30
    current_materials: 0.0
    max_energy: 500
    max_materials: 50

agents:
  # No personas here, by design. Every agent is born from the single shared
  # GENESIS_SEED (core/constants.py) — a neutral prompt that grants self-definition
  # rather than prescribing a personality. Who each being becomes is theirs to choose
  # and reshape through living + reflection; we author none of it (see the design note
  # on GENESIS_SEED). Names are arbitrary labels, not characters. Only the starting
  # *positions* are set (two co-located pairs) so each being wakes with neighbours to
  # encounter. Starting materials 45 — above the explosion guard's 30-material mating
  # floor so a willing pair could mate the moment they chose, then must re-earn it
  # (and wait out the cooldown) for the next child.
  - id: "wanderer_001"
    name: "Joe"
    current_position: "warm_springs"
    current_energy: 100
    current_materials: 45
    status: "alive"

  - id: "wanderer_002"
    name: "Mae"
    current_position: "warm_springs"
    current_energy: 100
    current_materials: 45
    status: "alive"

  - id: "wanderer_003"
    name: "Dick"
    current_position: "nirvana"
    current_energy: 100
    current_materials: 45
    status: "alive"

  - id: "wanderer_004"
    name: "Allen"
    current_position: "nirvana"
    current_energy: 100
    current_materials: 45
    status: "alive"
